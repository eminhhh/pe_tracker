name: Refresh Project Euler Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-pe-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit_push.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependency
        run: python3 -m pip install --disable-pip-version-check requests

      - name: Create runtime Project Euler cookie file
        run: |
          if [ -z "${{ secrets.PE_PJ_COOKIE }}" ]; then
            echo "PE_PJ_COOKIE secret is required." >&2
            exit 1
          fi

          mkdir -p .env
          printf 'PJ_COOKIE=%s\n' "${{ secrets.PE_PJ_COOKIE }}" > .env/projecteuler_server.env

      - name: Refresh levels and missing question files
        run: |
          python3 tools/build_levels_json.py
          python3 tools/download_questions.py
          python3 tools/build_question_search_index.py

      - name: Commit and push data changes
        id: commit_push
        run: |
          git add data/levels.json data/questions data/question_search_index.json
          if git diff --cached --quiet; then
            echo "No data updates detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh levels, questions, and search index"
          attempts=0
          until [ "$attempts" -ge 2 ]; do
            git pull --rebase origin main && git push && break
            attempts=$((attempts + 1))
            if [ "$attempts" -ge 2 ]; then
              echo "Failed to push refreshed data after retry." >&2
              exit 1
            fi
            sleep 2
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy_pages:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject asset version for cache busting
        run: |
          ASSET_VERSION="$(git rev-parse --short HEAD)"
          sed -i "s/__ASSET_VERSION__/${ASSET_VERSION}/g" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
